<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Cat Health Log v10</title>
    <style>
        :root {
            --main-bg: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #ffcc00; 
            --text-color: #e0e0e0;
            --border-radius: 16px;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; }

        header { text-align: center; margin-bottom: 20px; }
        .cat-icon { font-size: 40px; }
        h1 { font-size: 1.2rem; color: var(--accent-color); margin: 5px 0; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h2 { font-size: 1rem; border-left: 4px solid var(--accent-color); padding-left: 10px; margin: 0 0 15px; }
        label { display: block; margin: 10px 0 5px; font-size: 0.85rem; color: #bbb; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .day-group {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .day-date { font-weight: bold; color: var(--accent-color); }
        .day-total { font-size: 0.8rem; color: #aaa; }

        .entry-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px dotted #444;
        }
        .entry-info { flex: 1; margin-right: 10px; }
        .entry-actions { display: flex; gap: 5px; }

        .btn-edit { background: #444; color: #ffcc00; padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; border: 1px solid #ffcc00; cursor: pointer; min-width: 45px;}
        .btn-delete { background: #511; color: #f66; padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; border: 1px solid #f66; cursor: pointer; min-width: 45px;}
        
        .gcal-btn {
            display: block;
            background: #4285F4;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            text-decoration: none;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        .today-row { border-color: var(--accent-color); background: #1e1e0a; }
        .edit-active { border: 2px solid var(--accent-color); background: #2d2d00; }

        /* マスターリスト用のスタイル */
        .master-list { list-style: none; padding: 0; margin-top: 15px; font-size: 0.85rem; }
        .master-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #444; }
        .master-actions { display: flex; gap: 5px; }
        
        .sync-status { text-align: center; font-size: 0.75rem; color: #4285F4; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="top">
    <header>
        <div class="cat-icon">🐈‍⬛</div>
        <h1>Black Cat Health Log</h1>
    </header>

    <div class="card" id="inputCard">
        <h2 id="formTitle">📝 記録入力</h2>
        <label>日時を選択</label>
        <input type="datetime-local" id="recordDateTime">
        
        <label>ごはんの内容（うんち記録時は無視されます）</label>
        <select id="foodSelect"></select>
        
        <label>量 (g または 袋数 / 0.5刻み)</label>
        <input type="number" id="amount" step="0.5" min="0" placeholder="例: 1.5">
        
        <label>💩 うんちの長さ (cm)</label>
        <input type="number" id="poopLength" placeholder="例: 8">
        
        <button id="saveBtn" onclick="saveRecord()">この内容で保存する</button>
        <button id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#555; color:#fff; margin-top:10px;">編集をキャンセル</button>
    </div>

    <div class="card">
        <h2>📅 履歴 (最新31日分)</h2>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="card" id="masterCard">
        <h2>🍔 フード・おやつ登録</h2>
        <input type="text" id="foodName" placeholder="例: プレミアム黒猫フード">
        <label>100g または 1袋あたりのkcal</label>
        <input type="number" id="foodCal" placeholder="例: 75">
        <select id="foodType">
            <option value="per100g">100gあたりの計算</option>
            <option value="perUnit">1袋あたりの計算</option>
        </select>
        
        <button id="masterSaveBtn" style="background: #444; color: #fff;" onclick="saveFoodMaster()">マスターに追加</button>
        <button id="masterCancelBtn" style="display:none; background: #555; color: #fff; margin-top:10px;" onclick="cancelMasterEdit()">編集キャンセル</button>
        
        <h3 style="font-size: 0.9rem; margin-top: 20px; color: #bbb;">📋 登録済みアイテム</h3>
        <ul id="masterDisplay" class="master-list"></ul>
    </div>

    <div class="card" style="opacity: 0.8; font-size: 0.8rem;">
        <h2>⚙️ 設定</h2>
        <label>Google Apps Script (GAS) のURL</label>
        <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" onchange="saveSettings()">
        <p style="font-size: 0.7rem; color: #aaa;">このURLが設定されていると、記録のたびに裏側でカレンダーが自動更新されます。</p>
        
        <button onclick="emergencyReset()" style="background:#333; color:#f66; font-size:0.7rem; margin-top:20px; padding:5px;">⚠️ データを初期化する</button>
    </div>
</div>

<script>
    let foodMaster = [];
    let healthLogs = [];
    let userSettings = { gasUrl: '' };
    let editingIndex = -1;
    let editingMasterIndex = -1; // マスター編集用の状態管理

    function loadData() {
        try {
            foodMaster = JSON.parse(localStorage.getItem('foodMaster')) || [];
            healthLogs = JSON.parse(localStorage.getItem('healthLogs')) || [];
            userSettings = JSON.parse(localStorage.getItem('userSettings')) || { gasUrl: '' };
        } catch (e) {
            console.error("Data load failed", e);
            foodMaster = []; healthLogs = [];
        }
    }

    function init() {
        loadData();
        if(editingIndex === -1) setCurrentDateTime();
        
        const gasEl = document.getElementById('gasUrl');
        if(gasEl) gasEl.value = userSettings.gasUrl || '';
        
        updateFoodSelect();
        renderHistory();
    }

    // 日本時間での正確な日付文字列 (YYYY-MM-DD) を取得する関数
    function getLocalDateString(dateObj) {
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function setCurrentDateTime() {
        const now = new Date();
        const dateStr = getLocalDateString(now);
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const el = document.getElementById('recordDateTime');
        if(el) el.value = `${dateStr}T${hh}:${min}`;
    }

    function saveSettings() {
        userSettings.gasUrl = document.getElementById('gasUrl').value;
        localStorage.setItem('userSettings', JSON.stringify(userSettings));
        renderHistory(); 
    }

    // マスター保存（新規追加・上書き修正の両方に対応）
    function saveFoodMaster() {
        const name = document.getElementById('foodName').value;
        const cal = parseFloat(document.getElementById('foodCal').value);
        const type = document.getElementById('foodType').value;
        if(!name || isNaN(cal)) return alert('正しい値を入力してください');
        
        if (editingMasterIndex > -1) {
            // 修正モードの場合
            foodMaster[editingMasterIndex] = { name, cal, type };
            editingMasterIndex = -1;
            document.getElementById('masterSaveBtn').innerText = "マスターに追加";
            document.getElementById('masterCancelBtn').style.display = "none";
            document.getElementById('masterCard').classList.remove('edit-active');
            alert('マスター情報を更新しました');
        } else {
            // 新規追加モードの場合
            foodMaster.push({ name, cal, type });
            alert('マスターに登録しました');
        }
        
        localStorage.setItem('foodMaster', JSON.stringify(foodMaster));
        
        document.getElementById('foodName').value = "";
        document.getElementById('foodCal').value = "";
        
        updateFoodSelect();
    }

    // マスターの編集モードを開始する機能
    function editFoodMaster(index) {
        const f = foodMaster[index];
        if(!f) return;
        
        document.getElementById('foodName').value = f.name;
        document.getElementById('foodCal').value = f.cal;
        document.getElementById('foodType').value = f.type || 'per100g';
        
        editingMasterIndex = index;
        document.getElementById('masterSaveBtn').innerText = "上書き保存する";
        document.getElementById('masterCancelBtn').style.display = "block";
        document.getElementById('masterCard').classList.add('edit-active');
        
        // マスター登録枠までスクロール
        document.getElementById('masterCard').scrollIntoView({ behavior: 'smooth' });
    }

    // マスター編集のキャンセル
    function cancelMasterEdit() {
        editingMasterIndex = -1;
        document.getElementById('foodName').value = "";
        document.getElementById('foodCal').value = "";
        document.getElementById('masterSaveBtn').innerText = "マスターに追加";
        document.getElementById('masterCancelBtn').style.display = "none";
        document.getElementById('masterCard').classList.remove('edit-active');
    }

    function deleteFoodMaster(index) {
        if(confirm('このアイテムをマスターから削除しますか？\n※過去の記録でこのフードを選んでいた場合、名前が表示されなくなる可能性があります。')) {
            foodMaster.splice(index, 1);
            localStorage.setItem('foodMaster', JSON.stringify(foodMaster));
            updateFoodSelect();
        }
    }

    function updateFoodSelect() {
        const select = document.getElementById('foodSelect');
        const masterList = document.getElementById('masterDisplay');
        
        if(select) {
            select.innerHTML = foodMaster.map((f, i) => `<option value="${i}">${f.name}</option>`).join('');
        }
        
        if(masterList) {
            if(foodMaster.length === 0) {
                masterList.innerHTML = "<li style='color:#666;'>まだ登録されていません</li>";
            } else {
                masterList.innerHTML = foodMaster.map((f, i) => {
                    const typeLabel = f.type === 'per100g' ? '100g' : '1袋';
                    return `
                    <li class="master-item">
                        <span>${f.name} <small style="color:#aaa;">(${f.cal}kcal / ${typeLabel})</small></span>
                        <div class="master-actions">
                            <button class="btn-edit" onclick="editFoodMaster(${i})">編集</button>
                            <button class="btn-delete" onclick="deleteFoodMaster(${i})">削除</button>
                        </div>
                    </li>`;
                }).join('');
            }
        }
    }

    function saveRecord() {
        const dtStr = document.getElementById('recordDateTime').value;
        if(!dtStr) return alert('日時を選択してください');
        
        const parts = dtStr.split('T');
        const dateStr = parts[0];
        const timeStr = parts[1] || "00:00";
        const foodIdx = document.getElementById('foodSelect').value;
        const amount = parseFloat(document.getElementById('amount').value) || 0;
        const poop = parseFloat(document.getElementById('poopLength').value) || 0;

        let calResult = 0;
        let detail = "";
        let finalFoodIdx = -1;
        let finalAmount = 0;

        if (poop > 0) {
            detail = `💩 うんち記録 (${poop}cm)`;
        } else if (amount > 0) {
            const food = foodMaster[foodIdx];
            if(food) {
                const unitLabel = food.type === 'per100g' ? 'g' : '袋';
                calResult = food.type === 'per100g' ? (food.cal * amount / 100) : (food.cal * amount);
                detail = `🍴 ${food.name} ${amount}${unitLabel}`;
                finalFoodIdx = foodIdx;
                finalAmount = amount;
            } else {
                return alert('フードを選択してください');
            }
        } else {
            return alert('量、またはうんちの長さを入力してください');
        }

        const newLog = {
            date: dateStr,
            time: timeStr,
            kcal: calResult,
            poop: poop,
            detail: detail,
            amount: finalAmount,
            foodIdx: finalFoodIdx
        };

        if(editingIndex > -1) {
            healthLogs[editingIndex] = newLog;
            editingIndex = -1;
        } else {
            healthLogs.push(newLog);
        }

        localStorage.setItem('healthLogs', JSON.stringify(healthLogs));
        
        syncToGoogleCalendar(dateStr);

        resetForm();
        renderHistory();
        
        if(userSettings.gasUrl) {
            alert('保存し、カレンダーへ自動同期しました！');
        } else {
            alert('保存しました。（GAS設定がないためカレンダーには同期されていません）');
        }
    }

    async function syncToGoogleCalendar(dateStr) {
        const gasUrl = userSettings.gasUrl;
        if (!gasUrl || !gasUrl.startsWith("http")) return;

        const dayLogs = healthLogs.filter(l => l.date === dateStr);
        const totalKcal = dayLogs.reduce((sum, l) => sum + (Number(l.kcal) || 0), 0).toFixed(0);
        const totalPoop = dayLogs.reduce((sum, l) => sum + (Number(l.poop) || 0), 0).toFixed(1);
        
        let details = "■本日の内訳\n";
        dayLogs.sort((a, b) => (a.time || "00:00").localeCompare(b.time || "00:00")).forEach(l => {
            details += `・${l.time}：${l.detail}\n`;
        });

        try {
            fetch(gasUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    date: dateStr,
                    totalKcal: totalKcal,
                    totalPoop: totalPoop,
                    details: details
                })
            });
            console.log("同期リクエスト送信完了:", dateStr);
        } catch (e) {
            console.error("同期エラー:", e);
        }
    }

    function editRecord(index) {
        editingIndex = index;
        const log = healthLogs[index];
        if(!log) return;
        document.getElementById('recordDateTime').value = `${log.date}T${log.time || '00:00'}`;
        document.getElementById('foodSelect').value = log.foodIdx !== undefined ? log.foodIdx : -1;
        document.getElementById('amount').value = log.amount || 0;
        document.getElementById('poopLength').value = log.poop || 0;
        document.getElementById('formTitle').innerText = "⚠️ 記録を修正中";
        document.getElementById('saveBtn').innerText = "上書き保存する";
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('inputCard').classList.add('edit-active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteRecord(index) {
        if(confirm('消去しますか？')) {
            const dateStr = healthLogs[index].date;
            healthLogs.splice(index, 1);
            localStorage.setItem('healthLogs', JSON.stringify(healthLogs));
            syncToGoogleCalendar(dateStr);
            renderHistory();
        }
    }

    function cancelEdit() {
        editingIndex = -1;
        resetForm();
    }

    function resetForm() {
        document.getElementById('formTitle').innerText = "📝 記録入力";
        document.getElementById('saveBtn').innerText = "この内容で保存する";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('inputCard').classList.remove('edit-active');
        document.getElementById('amount').value = "";
        document.getElementById('poopLength').value = "";
        setCurrentDateTime();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if(!list) return;
        list.innerHTML = '';
        
        const now = new Date();
        const todayStr = getLocalDateString(now); // 日本時間の正確な「今日」
        
        try {
            for (let i = 0; i < 31; i++) {
                const d = new Date();
                d.setDate(now.getDate() - i);
                const dateStr = getLocalDateString(d); // 日本時間ベースで計算
                
                const dayLogs = healthLogs
                    .map((l, idx) => ({...l, originalIndex: idx}))
                    .filter(l => l.date === dateStr)
                    .sort((a, b) => (a.time || "00:00").localeCompare(b.time || "00:00"));

                // 記録がない日は非表示（ただし今日から7日前までは空でも表示する）
                if (dayLogs.length === 0 && i > 7) continue;

                const totalKcal = dayLogs.reduce((sum, l) => sum + (Number(l.kcal) || 0), 0).toFixed(0);
                const totalPoop = dayLogs.reduce((sum, l) => sum + (Number(l.poop) || 0), 0).toFixed(1);
                const isToday = dateStr === todayStr ? 'today-row' : '';

                let entriesHtml = dayLogs.map(l => `
                    <div class="entry-item">
                        <div class="entry-info">
                            <b>${l.time || '--:--'}</b> ${l.detail || '記録'} 
                            <span style="color:#888;">(${(Number(l.kcal) || 0).toFixed(0)}kcal)</span>
                        </div>
                        <div class="entry-actions">
                            <button class="btn-edit" onclick="editRecord(${l.originalIndex})">修正</button>
                            <button class="btn-delete" onclick="deleteRecord(${l.originalIndex})">消去</button>
                        </div>
                    </div>
                `).join('');

                let syncArea = '';
                if (userSettings.gasUrl && userSettings.gasUrl.startsWith("http")) {
                    syncArea = `<div class="sync-status">🔄 保存・修正時にカレンダーへ自動同期されます</div>`;
                } else {
                    const title = `【タマ日報】${totalKcal}kcal / 💩${totalPoop}cm`;
                    const gDate = dateStr.replace(/-/g, '');
                    let details = "■本日の内訳\n";
                    dayLogs.forEach(l => { details += `・${l.time}：${l.detail || '記録'}\n`; });
                    const gUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${gDate}/${gDate}&details=${encodeURIComponent(details)}&sf=true&output=xml`;
                    syncArea = `<a href="${gUrl}" target="_blank" class="gcal-btn">Googleカレンダーに手動で追加</a>`;
                }

                list.innerHTML += `
                    <div class="day-group ${isToday}">
                        <div class="day-header">
                            <div class="day-date">${dateStr}</div>
                            <div class="day-total">${totalKcal} kcal / 💩${totalPoop} cm</div>
                        </div>
                        <div class="day-entries">${entriesHtml || '<div style="font-size:0.7rem; color:#666;">記録なし</div>'}</div>
                        ${syncArea}
                    </div>
                `;
            }
        } catch (err) {
            console.error("Render error", err);
        }
    }

    function emergencyReset() {
        if(confirm('すべてのデータを消去しますか？（消えたデータは戻りません）')) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
